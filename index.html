<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <title>Electric Car</title>
</head>

<body>
    <div class="container">

        <header class="header">
            <div class="header-logo">
                <i class="fa-solid fa-car fa-xl" style="color: #ffffff;"></i>
                <p>Electric Cars</p>
            </div>
            <i class="fa-solid fa-bars fa-xl" style="color: #ffffff;"></i>
        </header>

        <section class="filter">
            <p>Ordenar Por:</p>
        </section>

        <main class="main">
            <div class="main-content">
                <img class="img-car"
                    src="https://images.unsplash.com/photo-1585011664463-faa17bae1d35?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="img car">
                <div class="main-text">
                    <p>Model: City Car</p>
                    <button class="button">Ver más</button>
                </div>
            </div>

            <div class="main-number">
                <p><<</p>
                <p>1</p>
                <p>2</p>
                <p>3</p>
                <p>>></p>
            </div>
            
        </main>

        <footer class="footer">
            
        </footer>
    </div>


    <script src="https://kit.fontawesome.com/eea7d32e1d.js" crossorigin="anonymous"></script>
</body>

</html>
