<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/password.css">
    <title>Password</title>
</head>
<body>
    <h2>Selecciona los 3 dígitos del password</h2>

  <select id="digit1">
    <option value="">-</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
  </select>

  <select id="digit2">
    <option value="">-</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
  </select>

  <select id="digit3">
    <option value="">-</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
  </select>

  <br><br>
  <button id="verificar">Ingresar</button>
  <p id="resultado"></p>

  <script>
    document.querySelector('#verificar').addEventListener('click', function() {
      let d1 = document.querySelector('#digit1').value;
      let d2 = document.querySelector('#digit2').value;
      let d3 = document.querySelector('#digit3').value;

      let password = d1 + d2 + d3;

      let resultado = document.querySelector('#resultado');

      if (password == '911') {
        resultado.innerHTML = 'password 1 correcto';
      } else if (password == '714') {
        resultado.innerHTML = 'password 2 correcto';
      } else {
        resultado.innerHTML = 'password incorrecto';
      }
    });
  </script>
</body>
</html>
